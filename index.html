<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PileLog Pro v2.0.0</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#050505;--panel:#111;--panel2:#171717;--line:#333;--gold:#d4a431;--gold2:#ffd04d;--text:#f4f4f4;--muted:#bdbdbd;--bad:#5b1414;--good:#123f24;}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#1a1a1a,#030303 58%);color:var(--text);font-family:Arial,Helvetica,sans-serif;min-height:100vh}button,input,select,textarea{font:inherit}button{cursor:pointer}
.app{display:flex;min-height:100vh}.sidebar{width:270px;background:linear-gradient(180deg,#090909,#050505);border-right:1px solid var(--line);padding:26px 18px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh}.side-logo{text-align:center}.side-logo img{width:120px;height:auto;object-fit:contain}.side-logo h2{margin:8px 0 2px;font-size:29px}.version-top{position:fixed;right:24px;top:20px;color:var(--gold2);font-size:16px;z-index:5}.nav{display:flex;flex-direction:column;gap:8px;margin-top:12px}.nav button{background:transparent;color:#eee;border:0;text-align:left;padding:15px 16px;border-radius:10px;font-size:17px}.nav button.active,.nav button:hover{background:linear-gradient(90deg,rgba(212,164,49,.30),rgba(212,164,49,.05));color:var(--gold2);outline:1px solid rgba(212,164,49,.25)}.newBtn{margin-top:auto;border:1px solid var(--gold);color:var(--gold2);background:#0c0c0c;border-radius:10px;padding:16px;font-size:18px}
.main{flex:1;padding:38px 34px 28px;overflow:auto}.hero{text-align:center;margin:0 auto 28px;max-width:980px}.hero img{width:300px;max-width:50vw;height:auto}.hero h1{font-size:76px;line-height:.95;margin:8px 0 8px;text-shadow:0 5px 18px #000}.tag{color:var(--gold2);letter-spacing:3px;font-weight:700;font-size:20px}.verline{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:20px}.verline:before,.verline:after{content:"";width:64px;height:1px;background:var(--gold)}
.grid{display:grid;grid-template-columns:repeat(4,minmax(180px,1fr));gap:18px;max-width:1200px;margin:0 auto 18px}.card{background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));border:1px solid #343434;border-radius:16px;padding:28px;text-align:center;min-height:170px;box-shadow:0 18px 35px rgba(0,0,0,.25)}.card:hover{border-color:var(--gold);transform:translateY(-2px)}.ico{font-size:42px;color:var(--gold);margin-bottom:14px}.card h3{margin:0 0 10px;font-size:22px}.card p{margin:0;color:#ddd;line-height:1.35}.footer{text-align:center;color:var(--gold2);margin:26px 0 0}.footer small{display:block;color:#9f9f9f;margin-top:7px}
.panel{max-width:1220px;margin:0 auto 20px;background:rgba(10,10,10,.75);border:1px solid #303030;border-radius:14px;padding:22px}.panel h2{margin:0 0 15px;font-size:28px}.row{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:14px}label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px}input,textarea,select{width:100%;background:#0b0b0b;color:#fff;border:1px solid #3a3a3a;border-radius:8px;padding:11px}input:focus,textarea:focus{outline:1px solid var(--gold);border-color:var(--gold)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.btn{border:1px solid var(--gold);background:#111;color:var(--gold2);border-radius:8px;padding:11px 14px}.btn.primary{background:linear-gradient(180deg,#d4a431,#8b6511);color:#111;font-weight:800}.btn.danger{border-color:#a33;color:#ff7777}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #2a2a2a;padding:10px;text-align:left;vertical-align:middle}th{color:var(--gold2);font-size:12px;text-transform:uppercase;letter-spacing:.7px}td input{padding:8px;border-radius:6px}tr.good{background:rgba(18,63,36,.35)}tr.bad{background:rgba(91,20,20,.45)}.pill{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700}.pill.good{background:#144d2c;color:#90ffb2}.pill.bad{background:#611919;color:#ff9b9b}.hidden{display:none!important}.recent{max-width:1200px;margin:18px auto 0}@media(max-width:950px){.app{display:block}.sidebar{position:relative;width:100%;height:auto}.nav{display:grid;grid-template-columns:repeat(2,1fr)}.main{padding:24px 14px}.hero h1{font-size:48px}.hero img{width:200px}.grid,.row{grid-template-columns:1fr}.version-top{position:absolute}}
</style>
</head>

const storeKey='pilelogProV2';
let state=JSON.parse(localStorage.getItem(storeKey)||'null')||{projects:[],active:null};
const pages=[['dashboard','⌂ Dashboard'],['projects','▱ Projects'],['setup','⚙ Project Setup'],['logs','▤ Vibro Logs'],['reports','▥ Reports'],['export','▣ Export / PDF'],['import','⇧ Import'],['settings','⚙ Settings'],['about','ⓘ About']];
function save(){localStorage.setItem(storeKey,JSON.stringify(state));}
function activeProject(){return state.projects.find(p=>p.id===state.active)||state.projects[0]||null}
function moneyDate(){return new Date().toLocaleString();}
function num(v){const n=parseFloat(v);return isNaN(n)?null:n}
function fmt(v){return v===null||v===undefined||isNaN(v)?'':Number(v).toFixed(3)}
function calcSetup(p){const g=num(p.groundElevation), tip=num(p.minimumTipElevation); p.requiredEmbedment=(g!==null&&tip!==null)?g-tip:null; p.designTipElevation=tip!==null?tip:null;}
function calcLog(p,l){calcSetup(p); const g=num(p.groundElevation), d=num(l.drivenDepth); l.currentTipElevation=(g!==null&&d!==null)?g-d:null; l.status=(l.currentTipElevation!==null&&p.minimumTipElevation!==null)?(l.currentTipElevation<=p.minimumTipElevation?'OK':'SHORT'):'';}
function seed(){if(!state.projects.length){state.projects.push({id:crypto.randomUUID(),name:'Sample Project',location:'',client:'',groundElevation:'',minimumTipElevation:'',requiredEmbedment:null,designTipElevation:null,logs:[],modified:moneyDate()});state.active=state.projects[0].id;save();}}
function nav(){document.getElementById('nav').innerHTML=pages.map(p=>`<button id="nav-${p[0]}" onclick="show('${p[0]}')">${p[1]}</button>`).join('');}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));document.getElementById('nav-'+id)?.classList.add('active');render(id);}
function hero(){return `<div class="hero"><img src="${LOGO}"><h1>PileLog Pro</h1><div class="tag">PROFESSIONAL FOUNDATION CONSTRUCTION SOFTWARE</div><div class="verline">Version ${VERSION}</div></div>`}
function render(id){({dashboard:renderDash,projects:renderProjects,setup:renderSetup,logs:renderLogs,reports:renderReports,export:renderExport,import:renderImport,settings:renderSettings,about:renderAbout}[id]||renderDash)();}
function renderDash(){const recent=state.projects.slice(0,5);document.getElementById('dashboard').innerHTML=hero()+`<div class="grid">${[['📁','PROJECTS','View and manage your projects','projects'],['⚙','PROJECT SETUP','Set elevations and project parameters','setup'],['🏗','VIBRO LOGS','Enter and manage pile driving data','logs'],['▥','REPORTS','View production and status reports','reports'],['▣','EXPORT / PDF','Export logs and reports to PDF','export'],['⇧','IMPORT','Import projects or logs','import'],['⚙','SETTINGS','Configure application preferences','settings'],['ⓘ','ABOUT','About PileLog Pro and support','about']].map(c=>`<div class="card" onclick="show('${c[3]}')"><div class="ico">${c[0]}</div><h3>${c[1]}</h3><p>${c[2]}</p></div>`).join('')}</div><div class="panel recent"><h2 style="color:var(--gold2);font-size:18px">RECENT PROJECTS</h2>${projectTable(recent)}</div><div class="footer">🛡 McRoberts Field Technologies<small>© 2026 McRoberts Field Technologies. All Rights Reserved.</small></div>`}
function projectTable(list){return `<table><thead><tr><th>Project Name</th><th>Location</th><th>Last Modified</th><th></th></tr></thead><tbody>${list.map(p=>`<tr><td>${p.name}</td><td>${p.location||''}</td><td>${p.modified||''}</td><td><button class="btn" onclick="selectProject('${p.id}')">Open</button></td></tr>`).join('')||'<tr><td colspan="4">No projects yet.</td></tr>'}</tbody></table>`}
function renderProjects(){document.getElementById('projects').innerHTML=`<div class="panel"><h2>Projects</h2><div class="actions"><button class="btn primary" onclick="newProject()">New Project</button></div>${projectTable(state.projects)}</div>`}
function newProject(){const name=prompt('Project name?','New Project'); if(!name)return; const p={id:crypto.randomUUID(),name,location:'',client:'',groundElevation:'',minimumTipElevation:'',requiredEmbedment:null,designTipElevation:null,logs:[],modified:moneyDate()}; state.projects.unshift(p); state.active=p.id; save(); show('setup');}
function selectProject(id){state.active=id;save();show('setup');}
function renderSetup(){const p=activeProject(); if(!p)return renderProjects(); calcSetup(p);document.getElementById('setup').innerHTML=`<div class="panel"><h2>Project Setup</h2><div class="row"><div><label>Project Name</label><input value="${p.name||''}" oninput="updP('name',this.value)"></div><div><label>Location</label><input value="${p.location||''}" oninput="updP('location',this.value)"></div><div><label>Client / Owner</label><input value="${p.client||''}" oninput="updP('client',this.value)"></div><div><label>Date</label><input value="${p.date||''}" oninput="updP('date',this.value)"></div><div><label>Ground Elevation</label><input type="number" step="0.001" value="${p.groundElevation||''}" oninput="updP('groundElevation',this.value)"></div><div><label>Minimum Tip Elevation From Plans</label><input type="number" step="0.001" value="${p.minimumTipElevation||''}" oninput="updP('minimumTipElevation',this.value)"></div><div><label>Required Embedment</label><input readonly value="${fmt(p.requiredEmbedment)} ft"></div><div><label>Design Tip Elevation</label><input readonly value="${fmt(p.designTipElevation)}"></div></div><p style="color:var(--muted);margin-top:16px">Workflow: enter Ground Elevation and Minimum Tip Elevation. The app calculates Required Embedment and uses that elevation to check each vibro log.</p></div>`}
function updP(k,v){const p=activeProject(); p[k]=v;p.modified=moneyDate();calcSetup(p);p.logs.forEach(l=>calcLog(p,l));save();render(document.querySelector('.view:not(.hidden)').id);}
function renderLogs(){const p=activeProject(); if(!p)return renderProjects(); p.logs.forEach(l=>calcLog(p,l));document.getElementById('logs').innerHTML=`<div class="panel"><h2>Vibro Logs — ${p.name}</h2><div class="actions"><button class="btn primary" onclick="addLog()">Add Pile Log</button><button class="btn" onclick="exportPDF()">Export All Logs to PDF</button></div><table><thead><tr><th>Pile #</th><th>Date</th><th>Station / Location</th><th>Driven Depth ft</th><th>Current Tip Elev.</th><th>Status</th><th>Vibro Time</th><th>Blows</th><th>Notes</th><th></th></tr></thead><tbody>${p.logs.map((l,i)=>`<tr class="${l.status==='OK'?'good':l.status==='SHORT'?'bad':''}"><td><input value="${l.pile||''}" oninput="updLog(${i},'pile',this.value)"></td><td><input value="${l.date||''}" oninput="updLog(${i},'date',this.value)"></td><td><input value="${l.station||''}" oninput="updLog(${i},'station',this.value)"></td><td><input type="number" step="0.01" value="${l.drivenDepth||''}" oninput="updLog(${i},'drivenDepth',this.value)"></td><td>${fmt(l.currentTipElevation)}</td><td>${l.status?`<span class="pill ${l.status==='OK'?'good':'bad'}">${l.status==='OK'?'REACHED':'SHORT'}</span>`:''}</td><td><input value="${l.vibroTime||''}" oninput="updLog(${i},'vibroTime',this.value)"></td><td><input value="${l.blows||''}" oninput="updLog(${i},'blows',this.value)"></td><td><input value="${l.notes||''}" oninput="updLog(${i},'notes',this.value)"></td><td><button class="btn danger" onclick="delLog(${i})">Delete</button></td></tr>`).join('')||'<tr><td colspan="10">No logs yet. Click Add Pile Log.</td></tr>'}</tbody></table></div>`}
function addLog(){const p=activeProject();p.logs.push({pile:'',date:new Date().toLocaleDateString(),station:'',drivenDepth:'',currentTipElevation:null,status:'',vibroTime:'',blows:'',notes:''});p.modified=moneyDate();save();renderLogs();}
function updLog(i,k,v){const p=activeProject();p.logs[i][k]=v;calcLog(p,p.logs[i]);p.modified=moneyDate();save();renderLogs();}
function delLog(i){const p=activeProject(); if(confirm('Delete this log?')){p.logs.splice(i,1);save();renderLogs();}}
function renderReports(){const p=activeProject(); if(!p)return renderProjects(); const total=p.logs.length, ok=p.logs.filter(l=>l.status==='OK').length, short=p.logs.filter(l=>l.status==='SHORT').length;document.getElementById('reports').innerHTML=`<div class="panel"><h2>Reports</h2><div class="grid"><div class="card"><div class="ico">${total}</div><h3>Total Logs</h3></div><div class="card"><div class="ico">${ok}</div><h3>Reached Tip</h3></div><div class="card"><div class="ico">${short}</div><h3>Short</h3></div><div class="card"><div class="ico">${fmt(p.requiredEmbedment)||'-'}</div><h3>Required Embedment ft</h3></div></div></div>`}
function renderExport(){document.getElementById('export').innerHTML=`<div class="panel"><h2>Export / PDF</h2><p>Export all logs from the active project into one PDF document.</p><button class="btn primary" onclick="exportPDF()">Export All Logs to PDF</button></div>`}
function exportPDF(){const p=activeProject(); if(!p)return alert('No project selected.'); if(!window.jspdf)return alert('PDF library could not load. Check internet connection.'); const {jsPDF}=window.jspdf; const doc=new jsPDF(); let y=18; doc.setFontSize(18); doc.text('PileLog Pro - Vibro Log Report',14,y); y+=8; doc.setFontSize(10); doc.text(`Project: ${p.name||''}`,14,y); y+=6; doc.text(`Location: ${p.location||''}`,14,y); y+=6; doc.text(`Ground Elevation: ${p.groundElevation||''}   Minimum Tip Elevation: ${p.minimumTipElevation||''}   Required Embedment: ${fmt(p.requiredEmbedment)} ft`,14,y); y+=10; doc.setFontSize(8); ['Pile','Date','Station','Driven ft','Current Tip','Status','Vibro','Blows','Notes'].forEach((h,i)=>doc.text(h,[14,30,52,82,105,132,150,168,184][i],y)); y+=5; doc.line(14,y,200,y); y+=5; p.logs.forEach(l=>{calcLog(p,l); if(y>280){doc.addPage();y=18;}; doc.text(String(l.pile||''),14,y); doc.text(String(l.date||''),30,y); doc.text(String(l.station||''),52,y); doc.text(String(l.drivenDepth||''),82,y); doc.text(fmt(l.currentTipElevation),105,y); doc.text(l.status==='OK'?'REACHED':l.status==='SHORT'?'SHORT':'',132,y); doc.text(String(l.vibroTime||''),150,y); doc.text(String(l.blows||''),168,y); doc.text(String(l.notes||'').slice(0,28),184,y); y+=7; }); doc.save(`${(p.name||'PileLog-Pro').replace(/[^a-z0-9]/gi,'-')}-logs.pdf`);}
function renderImport(){document.getElementById('import').innerHTML=`<div class="panel"><h2>Import</h2><p>Paste a backup JSON file below to restore projects.</p><textarea id="importBox" rows="8"></textarea><div class="actions"><button class="btn primary" onclick="doImport()">Import JSON</button><button class="btn" onclick="downloadBackup()">Download Backup JSON</button></div></div>`}
function doImport(){try{const data=JSON.parse(document.getElementById('importBox').value); if(!data.projects)throw Error(); state=data; save(); show('projects');}catch(e){alert('Invalid backup JSON.')}}
function downloadBackup(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:'application/json'}));a.download='pilelog-pro-backup.json';a.click();}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="panel"><h2>Settings</h2><p>Application version: ${VERSION}</p><button class="btn danger" onclick="if(confirm('Clear all local projects?')){localStorage.removeItem(storeKey);location.reload();}">Clear Local Data</button></div>`}
function renderAbout(){document.getElementById('about').innerHTML=`<div class="panel" style="text-align:center"><img src="${LOGO}" style="width:180px"><h2>PileLog Pro</h2><p class="tag">Professional Foundation Construction Software</p><p>Version ${VERSION}</p><p>Developed by McRoberts Field Technologies.</p></div>`}
seed(); nav(); show('dashboard'); setInterval(save,5000);
</script>
</body></html>
